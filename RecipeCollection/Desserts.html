<!DOCTYPE html>
<html lang="en">

<head>
  <title>Desserts</title>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <link rel="stylesheet" href="style.css">
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
</head>

<body>

  <div class="p-5 header text-white text-center">
    <h1>Recipe Collection</h1>
    <p>On this site you will find easy and quick everyday recipes.</p>
  </div>

  <nav class="navbar navbar-expand-sm navbar-dark navbar-custom">
    <div class="container-fluid">
      <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#mainNav"
        aria-controls="mainNav" aria-expanded="false" aria-label="Toggle navigation">
        <span class="navbar-toggler-icon"></span>
      </button>
      <div class="collapse navbar-collapse" id="mainNav">
        <ul class="navbar-nav">
          <li class="nav-item">
            <a class="nav-link" href="index.html">Home page</a>
          </li>
          <li class="nav-item">
            <a class="nav-link" href="Recipes.html">Recipes</a>
          </li>
          <li class="nav-item">
            <a class="nav-link active" href="Desserts.html">Desserts</a>
          </li>
          <li class="nav-item">
            <a class="nav-link" href="Information.html">More information</a>
          </li>
        </ul>
      </div>
    </div>
  </nav>
  <main>
    <div class="container mt-5">
      <div class="row">
        <div class="col-sm-4">
          <h2>CAKE DESSERTS</h2>
          <p>My favorite cakes</p>
          <div id="resepti1"></div>
          <div id="resepti2" class="mt-4"></div>
          <div id="resepti3" class="mt-4"></div>

          <script>
            function haeResepti(url, targetId) {
              fetch(url)
                .then(response => response.json())
                .then(data => naytaResepti(data, targetId))
                .catch(error => {
                  document.getElementById(targetId).innerHTML =
                    "<p>Recipe could not be loaded</p>";
                });
            }

            function naytaResepti(data, targetId) {
              const meal = data.meals[0];
              let tiedot = `
        <h2>${meal.strMeal}</h2>
        <img src="${meal.strMealThumb}" class="img-fluid">
        <p>${meal.strInstructions}</p>
    `;
              document.getElementById(targetId).innerHTML = tiedot;
            }
            haeResepti("https://www.themealdb.com/api/json/v1/1/search.php?s=Carrot%20Cake", "resepti1");
            haeResepti("https://www.themealdb.com/api/json/v1/1/search.php?s=Salted%20Caramel%20Cheescake", "resepti2");
            haeResepti("https://www.themealdb.com/api/json/v1/1/search.php?s=Peanut%20Butter%20Cheesecake", "resepti3");
            haeResepti("https://www.themealdb.com/api/json/v1/1/search.php?s=Pancakes", "resepti4");
            haeResepti("https://www.themealdb.com/api/json/v1/1/search.php?s=Chocolate%20Raspberry%20Brownies", "resepti5");
            haeResepti("https://www.themealdb.com/api/json/v1/1/search.php?s=Peanut%20Butter%20Cookie", "resepti6");
          </script>
        </div>
        <div class="col-sm-8">
          <h2>OTHER FAVORITES</h2>
          <div id="resepti4"></div>
          <div id="resepti5" class="mt-4"></div>
          <div id="resepti6" class="mt-4"></div>
        </div>
      </div>
    </div>
  </main>
  <footer class="mt-5 p-4 bg-dark text-white text-center">
    <p>Recipe Collection</p>
  </footer>
</body>

</html>
