        <main>
            <div id="vastaus"></div>
            <script>
                fetch('https://vanessasusanna.github.io/digitekniikat.JSON')

                    .then(function (response) {
                        return response.json();
                    })
                    .then(function (json) {
                        kerro(json);
                    })
                    .catch(function (error) {
                        document.getElementById("vastaus").innerHTML =
                            "<p>Tietoa ei pystytä hakemaan</p>";
                    });

                function kerro(obj) {

                    let alku = new Date(obj.alkamispaiva);
                    let loppu = new Date(obj.loppumispaiva);
                    let alkuStr = alku.getDate() + "." + (alku.getMonth() + 1) + ".";
                    let loppuStr = loppu.getDate() + "." + (loppu.getMonth() + 1) + "." + loppu.getFullYear();

                    let tiedot = "<h1>" + obj.toteutuksenNimi + "</h1>";

                    tiedot += "<p>" + obj.osallistujienLkm + " kpl</p>";

                    for (var i = 0; i < obj.osallistujat.length; i++) {
                        tiedot += obj.osallistujat[i] + "<br>";
                    }
                    tiedot += "<p>" + alkuStr + "–" + loppuStr + "</p>";
                    tiedot += "<p>" + obj.kestoViikkoina + " viikkoa</p>";
                    tiedot += "<p><img src='" + obj.kuva + "' alt='" + obj.kuvaAlt + "'></p>";
                    document.getElementById("vastaus").innerHTML = tiedot;
                }
            </script>
        </main>
    </body>

    </html>
