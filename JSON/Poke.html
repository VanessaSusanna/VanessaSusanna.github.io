<!DOCTYPE html>
<html lang="fi">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="styles.css">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
    <title>Pokemon haku</title>
</head>

<body>
    <nav class="navbar navbar-expand-sm navbar-custom navbar-light">
        <div class="container-fluid">
            <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#collapsibleNavbar">
                <span class="navbar-toggler-icon"></span>
            </button>
            <div class="collapse navbar-collapse" id="collapsibleNavbar">
                <ul class="navbar-nav">
                    <li class="nav-item">
                        <a class="nav-link" href="index.html">Etusivu (Tehtävä 1 OSA I)</a>
                    </li>
                    <li class="nav-item">
                        <a class="nav-link" href="Toteutus.html">Tehtävä 1 OSA II </a>
                    </li>
                    <li class="nav-item">
                        <a class="nav-link" href="Poke.html">Pokemon haku (Tehtävä 2)</a>
                    </li>
                    <li class="nav-item">
                        <a class="nav-link" href="Saa.html">Tehtävä 3 </a>
                    </li>

                </ul>
            </div>
        </div>
    </nav>
    <main>
        <h1>Pokemon haku</h1>

        <input type="text" id="pokemonName" placeholder="Enter Pokemon name">
        <button onclick="poke()">hae</button><br>

        <button id="kaannaBtn" class="btn btn-warning d-none" onclick="kaannaPokemon()">
            Käännä
        </button>

        <div id="vastaus"></div>

        <div id="nimi">Kirjoita laatikkoon Pokemonin nimi</div>
        <p id="kuva2"></p>

        <script>
            function poke() {
                let name = document.getElementById("pokemonName").value;
                const pokeName = name.toLowerCase();

                fetch(`https://pokeapi.co/api/v2/pokemon/${pokeName}`)
                    .then(function (response) {
                        return response.json();
                    })
                    .then(function (responseJson) {
                        pokekuva(responseJson, name);
                    })
                    .catch(function (error) {
                        document.getElementById("vastaus").innerHTML =
                            "<p>Tietoa ei pystytä hakemaan</p>";
                    });
            }

            let nykyinenPokemon;

            function kaannaPokemon() {
                if (!nykyinenPokemon || !nykyinenPokemon.sprites.back_default) {
                    document.getElementById("vastaus").innerHTML +=
                        "<p>Selkäkuvaa ei ole saatavilla</p>";
                    return;
                }

                document.getElementById("kuva2").innerHTML = "";
                document.getElementById("nimi").innerHTML = "";

                let html = `<h3>${nykyinenPokemon.name} </h3>
        <img src="${nykyinenPokemon.sprites.back_default}" alt="Pokemon selin">
        <p><strong>Weight:</strong> ${nykyinenPokemon.weight}</p>
        <p><strong>Height:</strong> ${nykyinenPokemon.height}</p>
        <p><strong>Base experience:</strong> ${nykyinenPokemon.base_experience}</p>`;

                document.getElementById("vastaus").innerHTML = html;
            }

            function pokekuva(obj, name) {
                let pokeurl = obj.sprites.front_default;
                document.getElementById("kuva2").innerHTML =
                    "<img src='" + pokeurl + "'>";
                document.getElementById("nimi").innerHTML =
                    "<b>" + name + "</b>";
                document.getElementById("pokemonName").value = "";
                nykyinenPokemon = obj;
                document.getElementById("kaannaBtn").classList.remove("d-none");
            }
        </script>
    </main>
</body>

</html>
