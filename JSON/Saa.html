<!DOCTYPE html>
<html lang="fi">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="styles.css">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
    <title>Sää</title>
</head>

<body>
    <nav class="navbar navbar-expand-sm navbar-custom navbar-light">
        <div class="container-fluid">
            <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#collapsibleNavbar">
                <span class="navbar-toggler-icon"></span>
            </button>
            <div class="collapse navbar-collapse" id="collapsibleNavbar">
                <ul class="navbar-nav">
                    <li class="nav-item">
                        <a class="nav-link" href="index.html">Etusivu (Tehtävä 1 OSA I)</a>
                    </li>
                    <li class="nav-item">
                        <a class="nav-link" href="Toteutus.html">Tehtävä 1 OSA II </a>
                    </li>
                    <li class="nav-item">
                        <a class="nav-link" href="Poke.html">Pokemon haku (Tehtävä 2)</a>
                    </li>
                    <li class="nav-item">
                        <a class="nav-link" href="Saa.html">Tehtävä 3 </a>
                    </li>

                </ul>
            </div>
        </div>
    </nav>
    <main class="container mt-4">
        <h1>Sää Helsingissä</h1>
        <div id="saa"></div>

        <script>
            const url = "https://api.openweathermap.org/data/2.5/weather?id=658225&appid=665ecd56dfc08dbb50feb8b8f5034e28&lang=fi&units=metric";

            fetch(url)
                .then(response => response.json())
                .then(data => naytaSaa(data))
                .catch(error => {
                    document.getElementById("saa").innerHTML =
                        "<p>Tietoja ei pystytä hakea</p>";
                });

            function naytaSaa(data) {
                const nyt = new Date();
                const aika = nyt.getHours() + ":" + nyt.getMinutes().toString();
                const lampotila = data.main.temp;
                const tuuli = data.wind.speed;
                const kuva = data.weather[0].icon;
                const kuvaus = data.weather[0].description;

                let tiedot = `
            <p> Sää kello ${aika}</p>
            <p><strong>Sää: ${kuvaus}</strong></p>
            <p><strong>Lämpötila: ${lampotila} °C </strong></p>
            <p><strong>Tuuli: ${tuuli} m/s </strong></p>
            <p><img src="https://openweathermap.org/img/wn/${kuva}@2x.png" alt="${kuvaus}"></p>`;

                document.getElementById("saa").innerHTML = tiedot;
            }
        </script>
    </main>
</body>

</html>
