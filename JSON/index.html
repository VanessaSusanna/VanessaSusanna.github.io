<!DOCTYPE html>
<html lang="fi">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="styles.css">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
    <title>Etusivu</title>
</head>
<style>
    img {
        width: 100%;
    }
</style>

<body>
    <nav class="navbar navbar-expand-sm navbar-custom navbar-light">
        <div class="container-fluid">
            <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#collapsibleNavbar">
                <span class="navbar-toggler-icon"></span>
            </button>
            <div class="collapse navbar-collapse" id="collapsibleNavbar">
                <ul class="navbar-nav">
                    <li class="nav-item">
                        <a class="nav-link" href="index.html">Etusivu (Tehtävä 1 OSA I)</a>
                    </li>
                    <li class="nav-item">
                        <a class="nav-link" href="Toteutus.html">Tehtävä 1 OSA II </a>
                    </li>
                    <li class="nav-item">
                        <a class="nav-link" href="Poke.html">Poke haku (Tehtävä 2)</a>
                    </li>
                    <li class="nav-item">
                        <a class="nav-link" href="Saa.html">Tehtävä 3 </a>
                    </li>

                </ul>
            </div>
        </div>
    </nav>
    <main>
        <div id="vastaus"></div>
        <script>
            fetch('https://vanessasusanna.github.io/tietue.JSON')

                .then(function (response) {
                    return response.json();
                })
                .then(function (responseJson) {
                    kerro(responseJson);
                })
                .catch(function (error) {
                    document.getElementById("vastaus").innerHTML = "<p>Tietoa ei pystytä hakemaan</p>";
                })
            function kerro(obj) {
                let tiedot = "<h1>" + obj.otsikko + "</h1><br>"
                    + obj.kuvaus + "<br><hr>"
                    + "<p><img src=" + obj.kuva + "></p>"
                    + "<center><h3>" + "Opintojakso" + "</h3>" + "Nimi: " + obj.opintojakso.nimi + "<br>"
                    + "Tunnus: " + obj.opintojakso.tunnus + "<br>"
                    + "Opintopisteet: " + obj.opintojakso.opintopisteet + "<br></center>";
                tiedot += "<p><h3> Aiheet </h3>";
                for (var i = 0; i < obj.tekniikat.length; i++) {
                    tiedot += "<b>Aihe: " + obj.tekniikat[i].aihe + "</b>";
                    tiedot += " <a href=" + obj.tekniikat[i].linkki + ">" + obj.tekniikat[i].linkki + "</a>" + "<br>";
                }
                tiedot += "</p>";

                document.getElementById("vastaus").innerHTML = tiedot;

            }
        </script>
    </main>
</body>

</html>
